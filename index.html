<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>My Phone</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.phone {
    width: 320px;
    height: 640px;
    background: #1c1c1c;
    border-radius: 40px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    padding: 20px;
}

.screen {
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 25px;
    color: white;
    padding: 15px;
}

.app-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.app {
    width: 70px;
    height: 70px;
    background: #333;
    border-radius: 18px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    cursor: pointer;
}

.title {
    font-size: 18px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="phone">
    <div class="screen">

        <div class="title">📱 My Phone</div>

        <div class="app-grid">
            <div class="app">💬</div>
            <div class="app">📷</div>
            <div class="app">🎵</div>
            <div class="app">📁</div>
            <div class="app">🌐</div>
            <div class="app">⚙️</div>
        </div>

    </div>
</div>

</body>
</html>
